<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Director Demo Video</title>
    <style>
      :root {
        color: #172033;
        background: #f6f4ee;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        display: grid;
        gap: 14px;
        margin-bottom: 28px;
      }

      a {
        color: #2457a7;
      }

      .eyebrow {
        margin: 0;
        color: #657084;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        color: #111827;
        font-size: clamp(2.4rem, 6vw, 5.2rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .summary {
        max-width: 720px;
        margin: 0;
        color: #3c4658;
        font-size: 1.08rem;
        line-height: 1.65;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #111827;
        border: 1px solid #d8d3c7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border: 1px solid #c8c0b3;
        color: #172033;
        text-decoration: none;
      }

      .button.primary {
        border-color: #172033;
        background: #172033;
        color: #ffffff;
      }

      footer {
        margin-top: 32px;
        color: #657084;
        font-size: 0.95rem;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color: #e8edf6;
          background: #111316;
        }

        h1 {
          color: #f8fafc;
        }

        .summary,
        .eyebrow,
        footer {
          color: #b9c1cf;
        }

        a {
          color: #9cc4ff;
        }

        video,
        .button {
          border-color: #353b45;
        }

        .button {
          color: #e8edf6;
        }

        .button.primary {
          border-color: #f8fafc;
          background: #f8fafc;
          color: #111316;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Director demo</p>
        <h1>Self-presentation video</h1>
        <p class="summary">
          A narrated walkthrough produced by Director from a Storyboard against the public GitHub repository.
        </p>
      </header>

      <video
        controls
        preload="metadata"
        src="https://github.com/dubh3124/Director/releases/download/v0.1.0-alpha.0/director-self-presentation.mp4"
      >
        <a href="https://github.com/dubh3124/Director/releases/download/v0.1.0-alpha.0/director-self-presentation.mp4">
          Download the Director self-presentation video.
        </a>
      </video>

      <div class="actions">
        <a class="button primary" href="https://github.com/dubh3124/Director">View repository</a>
        <a class="button" href="https://github.com/dubh3124/Director/releases/download/v0.1.0-alpha.0/director-self-presentation.mp4">Download MP4</a>
      </div>

      <footer>
        Video asset hosted on the v0.1.0-alpha.0 GitHub release.
      </footer>
    </main>
  </body>
</html>
